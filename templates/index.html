<!DOCTYPE html>
<html>
<head>
    <title>Movie Recommendation System</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1 class="title">🎬 Movie Recommendation System</h1>

    <form action="/recommend" method="post" class="form-box">
        <label for="movie">Choose a movie:</label>
        <select name="movie" id="movie" class="dropdown">
            {% for movie in movie_list %}
            <option value="{{movie}}">{{movie}}</option>
            {% endfor %}
        </select>
        <button type="submit" class="btn">Recommend</button>
    </form>

    {% if recommendations %}
    <div class="results">
        <h2>✨ Recommended Movies</h2>
        <ul class="recommend-list">
            {% for movie in recommendations %}
            <li class="recommend-item">{{movie}}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}
</div>

</body>
</html>
